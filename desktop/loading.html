<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Catalog Quotation Desktop</title>
    <style>
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        font-family: "Segoe UI", Arial, sans-serif;
        background: linear-gradient(135deg, #eef4fb 0%, #f8fbff 100%);
        color: #15324b;
      }

      .panel {
        width: min(460px, calc(100vw - 48px));
        padding: 32px;
        border-radius: 24px;
        background: rgba(255, 255, 255, 0.9);
        box-shadow: 0 20px 45px rgba(21, 50, 75, 0.12);
        border: 1px solid rgba(255, 255, 255, 0.85);
      }

      h1 {
        margin: 0 0 12px;
        font-size: 28px;
      }

      p {
        margin: 0;
        line-height: 1.6;
        color: #4c6478;
      }

      .bar {
        height: 10px;
        margin-top: 24px;
        border-radius: 999px;
        overflow: hidden;
        background: #dce8f5;
      }

      .bar::after {
        content: "";
        display: block;
        width: 38%;
        height: 100%;
        border-radius: inherit;
        background: linear-gradient(90deg, #2563eb, #0f766e);
        animation: pulse 1.2s ease-in-out infinite;
      }

      @keyframes pulse {
        0% {
          transform: translateX(-30%);
        }
        50% {
          transform: translateX(160%);
        }
        100% {
          transform: translateX(-30%);
        }
      }
    </style>
  </head>
  <body>
    <section class="panel">
      <h1>Starting Catalog Quotation Desktop</h1>
      <p>The backend is launching in the background. The main interface will open automatically as soon as the API is ready.</p>
      <div class="bar" aria-hidden="true"></div>
    </section>
  </body>
  </html>
