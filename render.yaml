services:
  - type: web
    name: shriji-tiles-backend
    runtime: python
    plan: free
    rootDir: backend
    buildCommand: pip install -r requirements.txt && python build_runtime_cache.py
    startCommand: sh -c 'uvicorn main:app --host 0.0.0.0 --port ${PORT:-10000}'
    healthCheckPath: /health
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.11
      - key: ENABLE_CATALOG_AUTO_RELOAD
        value: "false"
      - key: CATALOG_RELOAD_INTERVAL_SECONDS
        value: "30"
      - key: ENABLE_IMAGE_VALIDATION
        value: "false"
      - key: ENABLE_IMAGE_VERSIONING
        value: "false"
      - key: CORS_ORIGINS
        sync: false
      - key: CORS_ORIGIN_REGEX
        sync: false
      - key: PRODUCT_CATALOG_IMAGES_DIR
        value: ./images
